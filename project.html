<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Project — Tobi Joshua</title>
  <link rel="icon" href="https://ik.imagekit.io/experthivetutors/ChatGPT%20Image%20Aug%207,%202025,%2006_07_53%20AM.png?updatedAt=1754572188208" type="image/png" />
  <script>
    (function () {
      var t = localStorage.getItem("theme");
      document.documentElement.setAttribute("data-theme", t || "dark");
    })();
  </script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="assets/css/tokens.css?v=20260711" />
  <link rel="stylesheet" href="assets/css/base.css?v=20260711" />
  <link rel="stylesheet" href="assets/css/components.css?v=20260711" />
</head>
<body>
  <div id="nav"></div>

  <main class="container" id="content">
    <a href="projects.html" class="back-link"><i class="fas fa-arrow-left"></i> All projects</a>
    <div id="detail"></div>
  </main>

  <div id="footer"></div>

  <div class="modal" id="modal" role="dialog" aria-modal="true">
    <div class="modal__box">
      <h3>Private Repository</h3>
      <p>Email <a href="mailto:info@experthivetutors.com">info@experthivetutors.com</a> for access.</p>
      <button class="btn btn--primary modal__close">Close</button>
    </div>
  </div>

  <script type="module">
    import {
      loadData, renderNav, renderFooter, badgeClass, badgeLabel, bindModal
    } from "./assets/js/app.js?v=20260711";
    import { bindTheme } from "./assets/js/theme.js?v=20260711";
    import { DETAIL_SECTIONS, DETAIL_IMAGES } from "./assets/js/project-detail.js?v=20260711";

    const id = new URLSearchParams(location.search).get("id");
    const data = await loadData();
    document.getElementById("nav").innerHTML = renderNav("projects", data.profile);
    document.getElementById("footer").innerHTML = renderFooter(data.profile);

    const p = data.projects.find((x) => x.id === id);
    const el = document.getElementById("detail");

    if (!p) {
      el.innerHTML = `<div class="prose"><p>Project not found.</p></div>`;
    } else {
      document.title = `${p.title} — Tobi Joshua`;
      const images = DETAIL_IMAGES[id] || [{ src: p.thumbnail, title: p.title }];
      const sections = DETAIL_SECTIONS[id] || [];

      const gallery = images.length ? `
        <div class="gallery">
          ${images.map((img) => `
            <figure class="gallery__item">
              <img src="${img.src}" alt="${img.title}" loading="lazy"${img.fallback ? ` onerror="this.onerror=null;this.src='${img.fallback}'"` : ""} />
              <figcaption>${img.title}</figcaption>
            </figure>
          `).join("")}
        </div>
      ` : "";

      const links = [];
      if (p.links?.github) links.push(`<a href="${p.links.github}" class="btn btn--primary" target="_blank" rel="noopener"><i class="fab fa-github"></i> Repository</a>`);
      if (p.links?.demo) links.push(`<a href="${p.links.demo}" class="btn btn--ghost" target="_blank" rel="noopener"><i class="fas fa-arrow-up-right-from-square"></i> Live demo</a>`);
      if (p.private) links.push(`<button class="btn btn--ghost private-link"><i class="fas fa-lock"></i> Request access</button>`);

      el.innerHTML = `
        <div class="detail-hero">
          <div style="display:flex;align-items:center;gap:0.75rem;flex-wrap:wrap;margin-bottom:0.5rem;">
            <span class="badge ${badgeClass(p.status)}">${badgeLabel(p.status)}</span>
            <span class="tag">${p.year}</span>
            <span class="tag">${p.type}</span>
          </div>
          <h1>${p.title}</h1>
          <p class="subtitle">${p.subtitle}</p>
          <div class="tags" style="margin-bottom:1.5rem;">
            ${p.tech.map((t) => `<span class="tag">${t}</span>`).join("")}
          </div>
        </div>
        ${gallery}
        <div class="prose">
          <p>${p.summary}</p>
          ${p.highlights?.length ? `<h4>Highlights</h4><ul>${p.highlights.map((h) => `<li>${h}</li>`).join("")}</ul>` : ""}
          ${sections.map((s) => `<h4>${s.title}</h4><ul>${s.items.map((i) => `<li>${i}</li>`).join("")}</ul>`).join("")}
        </div>
        <div class="detail-links">${links.join("")}</div>
      `;
    }

    bindModal();
    bindTheme();
  </script>
</body>
</html>
