    <h4>System Overview</h4>
    <ul>
      <li><strong>Supervised learning</strong>: Random Forest model used to identify known attacks (trained on <em>CICIDS 2018</em> and <em>SCVIC-APT</em> datasets).</li>
      <li><strong>Unsupervised learning</strong>: Autoencoder-based anomaly detection for unknown/novel threats.</li>
    </ul>

    <h4>Key Requirements</h4>
    <ul>
      <li>Windows OS</li>
      <li>Python 3.9 (&mdash; ensure you check <code>"Add Python 3.9 to PATH"</code> during installation)</li>
      <li>Npcap 1.71 (required for packet capture)</li>
    </ul>

    <h4>Installation & Setup</h4>
    <ol>
      <li>Create a virtual environment:
        <pre><code>python3.9 -m venv venv</code></pre>
      </li>
      <li>Activate the virtual environment:
        <pre><code>. /venv/Scripts/activate</code></pre>
      </li>
      <li>Install dependencies:
        <pre><code>python -m pip install -r requirements.txt</code></pre>
      </li>
      <li>Run the application:
        <pre><code>python application.py</code></pre>
      </li>
      <li>Open the web UI in your browser:
        <p><code>http://localhost:5000</code></p>
      </li>
    </ol>

    <h4>Troubleshooting</h4>
    <ul>
      <li><strong>Python:</strong> If installation fails, run installer with administrative privileges and ensure PATH option is selected.</li>
      <li><strong>Npcap:</strong> Follow Npcap installer prompts and reboot if required; ensure Npcap is installed in "WinPcap compatible" mode if asked.</li>
    </ul>

    <h4>Notes</h4>
